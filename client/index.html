    <!-- AEO: FAQ structured data (Answer Engine Optimization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does ReviewPlus help get more Google reviews?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ReviewPlus generates a QR code for your business. When customers scan it, they rate their experience. For 4–5 star ratings, AI writes a polished Google review that the customer posts with one tap. Unhappy customers stay private."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to set up ReviewPlus?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Setup takes under 3 minutes. Create an account, enter your business name and Google review link, and your QR code is ready to print and display."
          }
        },
        {
          "@type": "Question",
          "name": "Does ReviewPlus work for restaurants and salons?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ReviewPlus works for any local business including restaurants, cafes, salons, spas, auto repair shops, gyms, and retail stores. The QR code can be placed on receipts, tables, packaging, or any customer touchpoint."
          }
        },
        {
          "@type": "Question",
          "name": "What happens with negative feedback?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Customers who rate 1–3 stars see a private thank-you page. Their feedback is captured in your dashboard without being published on Google, protecting your public rating."
          }
        },
        {
          "@type": "Question",
          "name": "Does ReviewPlus improve Google ranking?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. More 5-star reviews directly improve your Google My Business ranking, making your business appear higher in local search results and Google Maps, which brings more walk-in customers."
          }
        }
      ]
    }
    </script>
